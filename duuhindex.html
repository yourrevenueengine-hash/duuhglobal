<title>duuh — vote the first drop</title>
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --black: #0a0906; --dark: #131210; --surface: #1c1a17;
  --iron: #2a2720; --gum: #C19A6B; --yellow: #F5C800;
  --white: #f2ede6; --muted: #7a7060; --red: #c73a1a;
}
html { scroll-behavior: smooth; }
body { background: var(--black); color: var(--white); font-family: 'Barlow', sans-serif; overflow-x: hidden; cursor: crosshair; }
body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E"); pointer-events: none; z-index: 999; opacity: 0.6; }
body::after { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse at 20% 50%, rgba(193,154,107,0.04) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(245,200,0,0.03) 0%, transparent 50%); pointer-events: none; z-index: 998; }

nav { position: sticky; top: 0; z-index: 100; background: rgba(10,9,6,0.95); backdrop-filter: blur(10px); border-bottom: 2px solid var(--gum); padding: 0 40px; height: 64px; display: flex; align-items: center; justify-content: space-between; }
.nav-logo { font-family: 'Permanent Marker', cursive; font-size: 32px; color: var(--gum); text-decoration: none; letter-spacing: 2px; text-shadow: 3px 3px 0px rgba(193,154,107,0.2); transition: color .15s; }
.nav-logo:hover { color: var(--yellow); }
.nav-links { display: flex; align-items: center; gap: 8px; }
.nav-link { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); text-decoration: none; padding: 8px 14px; border: 1px solid transparent; transition: all .15s; }
.nav-link:hover { color: var(--gum); border-color: rgba(193,154,107,0.3); }
.nav-shop { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; color: var(--black); background: var(--gum); padding: 8px 20px; text-decoration: none; clip-path: polygon(6px 0%, 100% 0%, calc(100% - 6px) 100%, 0% 100%); transition: background .15s; }
.nav-shop:hover { background: var(--yellow); }

.hero { padding: 80px 40px 60px; max-width: 1100px; margin: 0 auto; position: relative; overflow: hidden; }
.hero-bg-word { position: absolute; top: -20px; right: -20px; font-family: 'Permanent Marker', cursive; font-size: clamp(120px, 22vw, 260px); color: transparent; -webkit-text-stroke: 2px rgba(193,154,107,0.07); pointer-events: none; user-select: none; line-height: 1; letter-spacing: -4px; transform: rotate(-3deg); }
.eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: var(--gum); margin-bottom: 20px; opacity: 0; animation: fadeUp .6s ease forwards .1s; }
.hero h1 { font-family: 'Permanent Marker', cursive; font-size: clamp(52px, 9vw, 100px); line-height: 1.0; color: var(--white); margin-bottom: 8px; opacity: 0; animation: fadeUp .6s ease forwards .2s; text-shadow: 4px 4px 0px rgba(0,0,0,0.5); }
.hero h1 .gum { color: var(--gum); }
.hero h1 .yellow { color: var(--yellow); }
